    let answers = new Array(ALL_QUESTIONS.length).fill(null);

    function resetTest() {
        answers = new Array(ALL_QUESTIONS.length).fill(null);
        currentIndex = 0;
        document.getElementById('quizPanel').style.display = 'block';
        document.getElementById('resultArea').style.display = 'none';
        renderQuestion();
        updateProgress();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function renderQuestion() {
        const q = ALL_QUESTIONS[currentIndex];
        const container = document.getElementById('questionContainer');
        const selectedVal = answers[currentIndex];
        let optsHtml = q.opts.map((opt, idx) => {
            const isSelected = (selectedVal !== null && selectedVal === idx);
            const selectedClass = isSelected ? 'selected' : '';
            return `<div class="option-btn ${selectedClass}" data-val="${idx}">
                        <span class="option-prefix">${String.fromCharCode(65+idx)}</span>
                        <span>${opt}</span>
                    </div>`;
        }).join('');
        const html = `<div class="question-card"><div class="q-num">✧ 漫步心途</div><div class="question-text">${q.text}</div><div class="options" id="optionsList">${optsHtml}</div></div>`;
        container.innerHTML = html;
        document.querySelectorAll('.option-btn').forEach(opt => {
            opt.addEventListener('click', () => {
                let newVal = parseInt(opt.dataset.val);
                if (answers[currentIndex] === newVal) return;
                answers[currentIndex] = newVal;
                renderQuestion();
            });
        });
        updateProgress();
    }

    function updateProgress() {
        const answered = answers.filter(a => a !== null).length;
        document.getElementById('qCounter').innerText = `${answered} / ${ALL_QUESTIONS.length}`;
        const percent = (answered / ALL_QUESTIONS.length) * 100;
        document.getElementById('progressFill').style.width = `${percent}%`;
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        prevBtn.disabled = (currentIndex === 0);
        nextBtn.innerText = (currentIndex === ALL_QUESTIONS.length-1) ? '✨ 邂逅学府 ✨' : '下一程 ▶';
    }

    function nextQuestion() {
        if (answers[currentIndex] === null) {
            alert('轻轻选择一个与你相契的答案吧 🌿');
            return;
        }
        if (currentIndex < ALL_QUESTIONS.length-1) {
            currentIndex++;
            renderQuestion();
        } else {
            computeMatchingSchool();
        }
    }

    function prevQuestion() {
        if (currentIndex > 0) {
            currentIndex--;
            renderQuestion();
        }
    }

    function computeMatchingSchool() {
        const prefs = answers.slice(0, PERSONAL_QUESTIONS.length);
        const genderPref = answers[PERSONAL_QUESTIONS.length];
        let schoolScores = SCHOOLS.map(school => {

            if (prefs[13] === 0 && (school.name.includes("Westminster") || school.name.includes("St Paul's"))) score += 2.5;
            if (prefs[13] === 2 && (school.name.includes("Wycombe") || school.name.includes("Cheltenham"))) score += 2.2;
            if (prefs[14] === 0 && (school.name.includes("St Paul's") || school.name.includes("Brighton"))) score += 2;
            if (prefs[14] === 1 && (school.name.includes("Winchester") || school.name.includes("Eton"))) score += 2;

            if (prefs[16] === 1 && (school.name.includes("Westminster") || school.name.includes("Sevenoaks"))) score += 2.2;
            if (prefs[16] === 2 && (school.name.includes("Cheltenham") || school.name.includes("Brighton"))) score += 2;
