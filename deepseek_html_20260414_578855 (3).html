<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="format-detection" content="telephone=no, email=no, address=no">
  <title>Kew School Quiz | 英国名校匹配测试</title>
  <style>
    :root{--ink:#123046;--soft:#466176;--gold:#c79f53;--line:rgba(18,48,70,.1);--bg:#f3f0e8;--bg2:#dbe6ef;--ok:#2f6c5c}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:"PingFang SC","Microsoft YaHei","Noto Sans SC",system-ui,sans-serif;color:var(--ink);background:radial-gradient(circle at top left,rgba(199,159,83,.22),transparent 34%),radial-gradient(circle at right 18%,rgba(29,68,94,.18),transparent 24%),linear-gradient(145deg,var(--bg) 0%,var(--bg2) 55%,#f9fcff 100%);padding:24px 14px 48px}
    .shell{max-width:1120px;margin:0 auto;background:rgba(255,255,255,.92);border-radius:32px;overflow:hidden;box-shadow:0 28px 80px rgba(18,48,70,.18);border:1px solid rgba(255,255,255,.5)}
    .hero{position:relative;overflow:hidden;padding:32px 28px 26px;color:#fff;background:linear-gradient(135deg,rgba(11,31,48,.96),rgba(31,69,89,.94))}
    .hero:before,.hero:after{content:"";position:absolute;border-radius:999px;opacity:.18}.hero:before{width:220px;height:220px;right:-70px;top:-70px;background:radial-gradient(circle,#fff 0%,transparent 70%)}.hero:after{width:170px;height:170px;left:-50px;bottom:-70px;background:radial-gradient(circle,#d5b06b 0%,transparent 68%)}
    .hero-row{position:relative;z-index:1;display:flex;align-items:flex-start;justify-content:space-between;gap:20px;flex-wrap:wrap}
    .brand{display:flex;align-items:center;gap:14px;max-width:720px}.logo{width:58px;height:58px;border-radius:18px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);padding:8px}.logo img{display:block;width:100%;height:100%;object-fit:contain;opacity:.9}
    h1{margin:0;font-size:clamp(1.8rem,3vw,2.6rem);line-height:1.1;letter-spacing:-.03em}.hero p{margin:10px 0 0;max-width:620px;color:rgba(255,255,255,.82);line-height:1.7;font-size:.98rem}
    .note{padding:12px 14px;border-radius:18px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);min-width:190px}.note strong,.note span{display:block}.note strong{font-size:.9rem;margin-bottom:6px}.note span{font-size:.82rem;color:rgba(255,255,255,.72);line-height:1.6}
    .content{padding:28px}.panel,.result-shell{border:1px solid var(--line);border-radius:28px;background:rgba(255,255,255,.86);box-shadow:0 10px 30px rgba(18,48,70,.05)}
    .progress{padding:18px 20px;margin-bottom:18px}.progress-row{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:10px;flex-wrap:wrap}.progress-title{font-weight:700}.progress-meta{color:var(--soft);font-size:.92rem}.track{width:100%;height:10px;border-radius:999px;background:rgba(18,48,70,.08);overflow:hidden}.fill{width:0;height:100%;background:linear-gradient(90deg,#bc9150,#e0c38d);transition:width .25s ease}
    .question{padding:26px}.q-label{margin:0 0 10px;color:#9a7434;font-size:.82rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase}.q-title{margin:0 0 24px;font-size:clamp(1.3rem,2.5vw,1.8rem);line-height:1.45}
    .options{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.option{display:flex;align-items:flex-start;gap:12px;width:100%;padding:16px 18px;border:1.5px solid rgba(18,48,70,.1);border-radius:22px;background:#fbfdff;color:var(--ink);cursor:pointer;transition:.18s;text-align:left}.option:hover{transform:translateY(-2px);border-color:rgba(199,159,83,.65);box-shadow:0 12px 24px rgba(18,48,70,.08)}.option.active{background:linear-gradient(135deg,rgba(199,159,83,.16),rgba(199,159,83,.06));border-color:rgba(199,159,83,.85)}
    .idx{width:34px;height:34px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;background:#eef3f7;color:#31526e;font-weight:700;flex:0 0 auto}.option.active .idx{background:var(--gold);color:#fff}.option span:last-child{line-height:1.6}
    .nav{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:18px;flex-wrap:wrap}.nav-left,.nav-right{display:flex;gap:12px;flex-wrap:wrap}.btn{border:none;border-radius:999px;padding:13px 20px;font-weight:700;font-size:.95rem;cursor:pointer;transition:.18s}.btn:disabled{cursor:not-allowed;opacity:.45}.btn-sec{background:#edf3f7;color:var(--ink)}.btn-pri{background:linear-gradient(135deg,#0f2e44,#214d65);color:#fff}.btn-acc{background:linear-gradient(135deg,#c79f53,#dfc58e);color:#263848}.btn:not(:disabled):hover{transform:translateY(-1px)}
    .hide{display:none}.result-shell{display:none;padding:22px}.result-head{display:flex;align-items:flex-end;justify-content:space-between;gap:18px;margin-bottom:20px;flex-wrap:wrap}.result-head h2{margin:0;font-size:clamp(1.45rem,2.6vw,2.2rem)}.result-head p{margin:8px 0 0;color:var(--soft);line-height:1.7}.chip{padding:10px 14px;border-radius:999px;background:rgba(199,159,83,.14);color:#8a682d;font-size:.88rem;font-weight:700}
    .cards{display:grid;gap:18px}.card{border:1px solid var(--line);border-radius:28px;overflow:hidden;background:#fff;box-shadow:0 16px 36px rgba(18,48,70,.08)}.card.featured{border-color:rgba(199,159,83,.45)}.card-grid{display:grid;grid-template-columns:minmax(0,1.2fr) minmax(0,1fr)}
    .media{position:relative;background:#d8e1e7;min-height:320px}.carousel{position:relative;height:100%;min-height:320px}.slide{position:absolute;inset:0;opacity:0;transition:opacity .35s ease}.slide.active{opacity:1}.slide img{width:100%;height:100%;display:block;object-fit:cover}
    .dots{position:absolute;left:18px;top:18px;z-index:2;display:flex;gap:8px}.dot{width:10px;height:10px;border-radius:50%;border:1px solid rgba(255,255,255,.55);background:rgba(255,255,255,.34)}.dot.active{background:#fff}
    .overlay{position:absolute;left:18px;right:18px;bottom:18px;display:flex;align-items:center;justify-content:space-between;gap:10px;z-index:2}.caption{max-width:72%;padding:10px 12px;border-radius:16px;background:rgba(8,21,33,.58);color:rgba(255,255,255,.92);font-size:.84rem;line-height:1.5}.controls{display:flex;gap:8px}.icon-btn{width:38px;height:38px;border:none;border-radius:50%;cursor:pointer;background:rgba(255,255,255,.9);color:var(--ink);font-size:1rem;font-weight:700;box-shadow:0 6px 18px rgba(7,18,28,.18)}
    .body{padding:22px}.rank{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:12px}.badge,.score{padding:8px 12px;border-radius:999px;font-size:.84rem;font-weight:800}.badge{background:rgba(18,48,70,.08)}.card.featured .badge{background:rgba(199,159,83,.16);color:#8a682d}.score{background:#eef5ef;color:var(--ok)}
    .name{margin:0;font-size:clamp(1.5rem,2.4vw,2rem)}.sub{margin:8px 0 0;color:var(--soft);line-height:1.7}.tags{display:flex;flex-wrap:wrap;gap:8px;margin:16px 0}.tag{padding:7px 11px;border-radius:999px;background:#f4f7fa;color:#40627d;font-size:.84rem;font-weight:600}
    .motto,.block{padding:14px 16px;border-radius:20px;margin-top:14px;line-height:1.75}.motto{background:linear-gradient(135deg,rgba(199,159,83,.14),rgba(199,159,83,.06));border:1px solid rgba(199,159,83,.22)}.block{background:#f8fbfd;border:1px solid rgba(18,48,70,.08)}.title{display:block;margin-bottom:6px;font-weight:800}
    .meta{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin-top:14px}.meta-item{padding:14px 16px;border-radius:20px;background:#f7f9fb;border:1px solid rgba(18,48,70,.08)}.meta-item strong,.meta-item span{display:block}.meta-item strong{margin-bottom:6px;font-size:.85rem;color:#7b8e9d}.meta-item span{line-height:1.6}
    .link{display:inline-flex;align-items:center;justify-content:center;margin-top:18px;padding:12px 18px;border-radius:999px;text-decoration:none;background:linear-gradient(135deg,#0f2e44,#214d65);color:#fff;font-weight:700}.foot{margin-top:18px;color:#6c8292;font-size:.84rem;line-height:1.7}
    @media (max-width:960px){.options,.card-grid,.meta{grid-template-columns:1fr}}
    @media (max-width:640px){body{padding:12px 8px 32px}.hero,.content,.question,.result-shell{padding-left:16px;padding-right:16px}.question{padding-top:20px;padding-bottom:20px}.carousel,.media{min-height:240px}.caption{max-width:100%;font-size:.78rem}.overlay{flex-direction:column;align-items:stretch}}
  </style>

const answers=new Array(QUESTIONS.length).fill(null);let currentQuestion=0;
const questionLabel=document.getElementById("questionLabel"),questionTitle=document.getElementById("questionTitle"),optionsWrap=document.getElementById("optionsWrap"),progressText=document.getElementById("progressText"),progressFill=document.getElementById("progressFill"),quizView=document.getElementById("quizView"),resultView=document.getElementById("resultView"),resultCards=document.getElementById("resultCards"),resultLead=document.getElementById("resultLead");
function updateProgress(){progressText.textContent=`第 ${currentQuestion+1} 题 / 共 ${QUESTIONS.length} 题`;progressFill.style.width=`${(currentQuestion+1)/QUESTIONS.length*100}%`;document.getElementById("prevBtn").disabled=currentQuestion===0;document.getElementById("nextBtn").textContent=currentQuestion===QUESTIONS.length-1?"查看结果":"下一题"}
function renderQuestion(){const q=QUESTIONS[currentQuestion];questionLabel.textContent=`Question ${currentQuestion+1}`;questionTitle.textContent=q.text;optionsWrap.innerHTML=q.options.map((o,i)=>`<button class="option ${answers[currentQuestion]===i?"active":""}" type="button" data-index="${i}"><span class="idx">${String.fromCharCode(65+i)}</span><span>${o.text}</span></button>`).join("");optionsWrap.querySelectorAll(".option").forEach(btn=>btn.addEventListener("click",()=>{answers[currentQuestion]=Number(btn.dataset.index);renderQuestion()}));updateProgress()}
function resetQuiz(){answers.fill(null);currentQuestion=0;resultView.style.display="none";quizView.classList.remove("hide");renderQuestion();window.scrollTo({top:0,behavior:"smooth"})}
function nextQuestion(){if(answers[currentQuestion]===null){window.alert("请先选择一个最符合你的答案，再继续下一题。");return}if(currentQuestion<QUESTIONS.length-1){currentQuestion+=1;renderQuestion()}else{showResults()}}
function previousQuestion(){if(currentQuestion>0){currentQuestion-=1;renderQuestion()}}
function summarizePreference(total){const labels={academic:"学术冲刺",urban:"都市资源",tradition:"传统底蕴",creativity:"创新表达",wellbeing:"幸福感与支持",global:"国际化",arts:"人文艺术",sports:"体育与行动力",collaboration:"群体协作",independence:"独立成长"};return Object.entries(total).filter(([k])=>!["maleOnly","femaleOnly","coedOnly","flexibleGender"].includes(k)).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([k])=>labels[k]||k).join(" / ")}
function calculateResults(){const total={};QUESTIONS.forEach((q,qi)=>{const picked=q.options[answers[qi]];Object.entries(picked.scores).forEach(([k,v])=>{total[k]=(total[k]||0)+v})});const ranked=SCHOOLS.map(s=>{let score=0;Object.entries(s.profile).forEach(([k,v])=>{score+=(total[k]||0)*v});if((total.femaleOnly||0)>0){score+=s.genderType==="female"?40:s.genderType==="coed"?8:-18}if((total.maleOnly||0)>0){score+=s.genderType==="male"?40:s.genderType==="coed"?8:-18}if((total.coedOnly||0)>0){score+=s.genderType==="coed"?42:-14}if((total.flexibleGender||0)>0){score+=s.genderType==="coed"?8:5}return{school:s,score}}).sort((a,b)=>b.score-a.score);const top=ranked.slice(0,3),highest=top[0].score||1;return{preferenceSummary:summarizePreference(total),top:top.map((item,index)=>({...item,rank:index+1,matchPercent:Math.max(76,Math.min(98,Math.round(item.score/highest*100)))}))}}
function createCarouselMarkup(school,idx){return`<div class="carousel" data-carousel="${idx}">${school.gallery.map((img,i)=>`<div class="slide ${i===0?"active":""}" data-slide="${i}"><img src="${img.src}" alt="${school.name} 实景图 ${i+1}" loading="lazy" referrerpolicy="no-referrer" onerror="this.src='https://placehold.co/1200x720/e7edf2/35516a?text=Campus+Photo+Unavailable'"></div>`).join("")}<div class="dots">${school.gallery.map((_,i)=>`<span class="dot ${i===0?"active":""}" data-dot="${i}"></span>`).join("")}</div><div class="overlay"><div class="caption" data-caption>${school.gallery[0].caption}</div><div class="controls"><button class="icon-btn" type="button" data-prev aria-label="上一张">‹</button><button class="icon-btn" type="button" data-next aria-label="下一张">›</button></div></div></div>`}
function renderResultCards(data){resultCards.innerHTML=data.top.map(({school,rank,matchPercent},index)=>`<article class="card ${index===0?"featured":""}"><div class="card-grid"><div class="media">${createCarouselMarkup(school,index)}</div><div class="body"><div class="rank"><span class="badge">Top ${rank} 推荐</span><span class="score">匹配度 ${matchPercent}%</span></div><h3 class="name">${school.name}</h3><p class="sub">${school.subtitle}</p><div class="tags"><span class="tag">${school.tagLine}</span><span class="tag">${school.gender}</span><span class="tag">${school.focus}</span></div><div class="motto"><span class="title">校训 / 精神底色</span>${school.motto}</div><div class="block"><span class="title">为什么适合你</span>${school.fit}</div><div class="block"><span class="title">学校风格简介</span>${school.intro}</div><div class="meta"><div class="meta-item"><strong>适合人群</strong><span>${school.focus}</span></div><div class="meta-item"><strong>结果气质关键词</strong><span>${school.tagLine}</span></div></div><a class="link" href="${school.website}" target="_blank" rel="noopener noreferrer">访问学校官网</a></div></div></article>`).join("");initCarousels(data.top.map(item=>item.school))}
function initCarousels(schools){document.querySelectorAll("[data-carousel]").forEach((carousel,carouselIndex)=>{const slides=[...carousel.querySelectorAll(".slide")],dots=[...carousel.querySelectorAll(".dot")],caption=carousel.querySelector("[data-caption]"),gallery=schools[carouselIndex].gallery;let current=0;const update=next=>{current=(next+slides.length)%slides.length;slides.forEach((slide,i)=>slide.classList.toggle("active",i===current));dots.forEach((dot,i)=>dot.classList.toggle("active",i===current));caption.textContent=gallery[current].caption};carousel.querySelector("[data-prev]").addEventListener("click",()=>update(current-1));carousel.querySelector("[data-next]").addEventListener("click",()=>update(current+1));dots.forEach((dot,i)=>dot.addEventListener("click",()=>update(i)))})}
function showResults(){const data=calculateResults();quizView.classList.add("hide");resultView.style.display="block";resultLead.textContent=`根据你的作答，你更偏向 ${data.preferenceSummary} 这类校园气质。以下是与你最贴近的 Top 3 学校推荐，每所学校都加入了多张实景轮播图。`;renderResultCards(data);window.scrollTo({top:0,behavior:"smooth"})}
document.getElementById("prevBtn").addEventListener("click",previousQuestion);
document.getElementById("nextBtn").addEventListener("click",nextQuestion);
document.getElementById("resetBtn").addEventListener("click",resetQuiz);
document.getElementById("restartFromResult").addEventListener("click",resetQuiz);
renderQuestion();
</script>
</body>
